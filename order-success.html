<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Order Confirmed · GlamEye</title>
  <link rel="canonical" href="https://glameyeshop.com/order-success.html" />
  <meta property="og:url" content="https://glameyeshop.com/order-success.html" />
  <meta property="og:image" content="https://glameyeshop.com/images/products/hero-lash.jpg" />
  <meta property="og:site_name" content="GlamEye" />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css?v=DEPLOYHASH" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand"><img src="images/logo.png" alt="GlamEye" class="brand-logo" width="160" height="36" /></a>
    </div>
  </header>
  <main class="container" style="max-width: 700px; padding: 4rem 1rem;">
    <div class="form-card">
      <div style="font-size: 4rem; text-align:center; margin-bottom: 1rem;">✨</div>
      <h1>Thank You!</h1>
      <p class="subtitle">Your order has been received.</p>
      <div id="order-detail" style="margin: 2rem 0; padding: 1.5rem; background: var(--black); border-radius: 12px;">
        <p class="muted">Loading order details…</p>
      </div>
      <div style="text-align:center;">
        <a href="/" class="button button-primary">Continue Shopping</a>
        <a href="account-orders.html" class="button button-outline" style="margin-left: 1rem;">View Orders</a>
      </div>
      <p class="muted small text-center" style="margin-top:2rem;">
        ✉️ A confirmation email is on its way. Questions? <a href="mailto:hello@glameyeshop.com">hello@glameyeshop.com</a>
      </p>
    </div>
  </main>
  <script src="js/app.js?v=DEPLOYHASH"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const orderId = parseInt(params.get('order_id'), 10);
      const stored = JSON.parse(sessionStorage.getItem('glameye_last_order') || '{}');
      const email = stored.email;
      const target = document.getElementById('order-detail');

      if (!orderId || !email) {
        target.innerHTML = '<p>Order ID missing. Please contact support@glameyeshop.com with your order number.</p>';
        return;
      }

      fetch(`api/order-status.php?order_id=${orderId}&email=${encodeURIComponent(email)}`)
        .then((r) => r.json())
        .then((j) => {
          if (j.error) { target.innerHTML = `<p>Could not load order: ${j.error}</p>`; return; }
          const o = j.order;
          const esc = window.GlamEye.Fmt.escape, m = window.GlamEye.Fmt.money;
          const items = (o.items || []).map((it) =>
            `<div class="summary-row"><span>${esc(it.product_name)} × ${it.quantity}</span><span>${m(it.line_total)}</span></div>`
          ).join('');
          target.innerHTML = `
            <h3 style="margin-bottom:1rem; color:var(--gold);">Order #${o.id}</h3>
            <p><strong>Customer:</strong> ${esc(o.customer_name)}</p>
            <p><strong>Payment:</strong> ${esc(o.payment_method)}</p>
            <p><strong>Status:</strong> <span class="product-badge">${esc(o.status)}</span></p>
            <p><strong>Placed:</strong> ${esc(o.created_at)}</p>
            <hr style="border:none; border-top:1px solid var(--border); margin:1rem 0;" />
            ${items}
            <div class="summary-row total"><span>Total</span><span>${m(o.amount)} USD</span></div>`;
        })
        .catch((e) => { target.innerHTML = `<p>Failed to load: ${e.message}</p>`; });
    })();
  </script>
</body>
</html>
