<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Order Confirmed · GlamEye</title>
  <link rel="canonical" href="https://glameyeshop.com/order-success.html" />
  <meta property="og:url" content="https://glameyeshop.com/order-success.html" />
  <meta property="og:image" content="https://glameyeshop.com/images/products/hero-lash.jpg" />
  <meta property="og:site_name" content="GlamEye" />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css?v=DEPLOYHASH" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0LESHNQ1LG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0LESHNQ1LG');
  </script>

</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand"><img src="images/logo.png?v=DEPLOYHASH" alt="GlamEye" class="brand-logo" width="160" height="36" /></a>
    </div>
  </header>
  <main class="container" style="max-width: 700px; padding: 4rem 1rem;">
    <div class="form-card">
      <!-- Test order banner -->
      <div id="test-banner" hidden style="background:rgba(247,185,85,.15);border:1px solid rgba(247,185,85,.4);color:var(--warn,#d49f3a);padding:.85rem 1.25rem;border-radius:8px;margin-bottom:1.5rem;text-align:center;font-size:.9rem;">
        ⚠️ <strong>TEST ORDER</strong> — no real payment was processed. This is for testing only.
      </div>
      <div style="font-size: 4rem; text-align:center; margin-bottom: 1rem;">✨</div>
      <h1>Thank You!</h1>
      <p class="subtitle">Your order has been received.</p>
      <div id="order-detail" style="margin: 2rem 0; padding: 1.5rem; background: var(--black); border-radius: 12px;">
        <p class="muted">Loading order details…</p>
      </div>
      <div style="text-align:center;">
        <a href="/" class="button button-primary">Continue Shopping</a>
        <a href="account-orders.html" class="button button-outline" style="margin-left: 1rem;">View Orders</a>
      </div>
      <p class="muted small text-center" style="margin-top:2rem;">
        ✉️ A confirmation email is on its way. Questions? <a href="mailto:hello@glameyeshop.com">hello@glameyeshop.com</a>
      </p>
    </div>
  </main>
  <script src="js/app.js?v=DEPLOYHASH"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const orderId = parseInt(params.get('order_id'), 10);
      // ?test=1 → 显示 TEST 徽章(test 账号订单跳过 Stripe 直接到这里)
      if (params.get('test') === '1') {
        const b = document.getElementById('test-banner');
        if (b) b.hidden = false;
      }
      const stored = JSON.parse(sessionStorage.getItem('glameye_last_order') || '{}');
      // P0#1: 优先用 token,fallback email
      const token = (params.get('lt') || params.get('token') || stored.lookup_token || '').trim();
      const email = stored.email;
      const target = document.getElementById('order-detail');

      if (!orderId || (!token && !email)) {
        target.innerHTML = '<p>Order ID missing. Please contact support@glameyeshop.com with your order number.</p>';
        return;
      }

      const qs = token
        ? 'order_id=' + orderId + '&token=' + encodeURIComponent(token)
        : 'order_id=' + orderId + '&email=' + encodeURIComponent(email);

      function render(o) {
        const esc = window.GlamEye.Fmt.escape, m = window.GlamEye.Fmt.money;
        const items = (o.items || []).map((it) =>
          `<div class="summary-row"><span>${esc(it.product_name)} × ${it.quantity}</span><span>${m(it.line_total)}</span></div>`
        ).join('');
        // pending 状态 + Stripe + 有 token → 显示"等待确认"提示 + 尝试兜底同步
        const isPending = o.status === 'pending' && o.payment_method === 'stripe' && token;
        const statusBadge = isPending
          ? '<span class="product-badge" style="background:rgba(247,185,85,.2);color:var(--warn,#d49f3a);">confirming payment…</span>'
          : `<span class="product-badge">${esc(o.status)}</span>`;
        target.innerHTML = `
          <h3 style="margin-bottom:1rem; color:var(--gold);">Order #${o.id}</h3>
          <p><strong>Customer:</strong> ${esc(o.customer_name)}</p>
          <p><strong>Payment:</strong> ${esc(o.payment_method)}</p>
          <p><strong>Status:</strong> ${statusBadge}</p>
          <p><strong>Placed:</strong> ${esc(o.created_at)}</p>
          <hr style="border:none; border-top:1px solid var(--border); margin:1rem 0;" />
          ${items}
          <div class="summary-row total"><span>Total</span><span>${m(o.amount)} USD</span></div>
          ${isPending ? '<p class="muted small" style="margin-top:1rem;text-align:center;">⏳ Confirming your payment with Stripe — this usually takes a few seconds. Refresh in a moment if the status doesn\'t update.</p>' : ''}`;
        return isPending;
      }

      async function syncFromStripe() {
        try {
          const r = await fetch('api/sync-order-from-stripe.php?order_id=' + orderId + '&token=' + encodeURIComponent(token));
          const j = await r.json();
          if (j.status && j.status !== 'pending') {
            // 状态变了,重新拉一次 order-status 显示
            const r2 = await fetch('api/order-status.php?' + qs);
            const j2 = await r2.json();
            if (j2.order) render(j2.order);
          }
        } catch (e) { /* 静默 — 用户刷新页面也会重试 */ }
      }

      fetch('api/order-status.php?' + qs)
        .then((r) => r.json())
        .then((j) => {
          if (j.error) { target.innerHTML = `<p>Could not load order: ${j.error}</p>`; return; }
          const isPending = render(j.order);
          // 如果还是 pending,1.5s 后调兜底同步(给 webhook 一点时间先到)
          if (isPending) setTimeout(syncFromStripe, 1500);
        })
        .catch((e) => { target.innerHTML = `<p>Failed to load: ${e.message}</p>`; });
    })();
  </script>
</body>
</html>
