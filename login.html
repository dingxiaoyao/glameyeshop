<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · GlamEye</title>
  <link rel="canonical" href="https://glameyeshop.com/login.html" />
  <meta property="og:url" content="https://glameyeshop.com/login.html" />
  <meta property="og:image" content="https://glameyeshop.com/images/products/hero-lash.jpg" />
  <meta property="og:site_name" content="GlamEye" />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css?v=DEPLOYHASH" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand">
        <img src="images/logo.png?v=DEPLOYHASH" alt="GlamEye" class="brand-logo" width="160" height="36" />
      </a>
      <nav class="site-nav"><a href="/">Back to Shop</a></nav>
    </div>
  </header>
  <main class="container" style="padding: 4rem 1rem;">
    <div class="form-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to manage your orders and wishlist</p>
      <p id="oauth-error" class="form-feedback error" style="display:none;"></p>
      <div id="social-login" class="form-group" style="display:none; margin-bottom:1.5rem;">
        <a href="api/oauth/google.php" id="btn-google"
           class="button button-outline button-block" style="display:none; gap:.5rem;">
          <span style="display:inline-block; width:18px; height:18px; background:#fff; color:#444; font-weight:700; border-radius:50%; line-height:18px; font-size:11px;">G</span>
          Continue with Google
        </a>
        <a href="api/oauth/tiktok.php" id="btn-tiktok"
           class="button button-outline button-block" style="display:none; gap:.5rem;">
          <span style="font-size:1rem;">🎵</span> Continue with TikTok
        </a>
      </div>
      <div id="social-divider" class="divider" style="display:none;">OR</div>
      <form id="login-form" class="form-group">
        <label>
          <span class="label-text">Email</span>
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>
          <span class="label-text">Password</span>
          <input type="password" name="password" required autocomplete="current-password" minlength="8" />
        </label>
        <button type="submit" class="button button-primary button-block">Sign In</button>
        <p id="login-feedback" class="form-feedback"></p>
      </form>
      <div class="divider">OR</div>
      <p class="text-center muted small">
        New to GlamEye? <a href="signup.html">Create an account</a>
      </p>
    </div>
  </main>
  <script src="js/app.js?v=DEPLOYHASH"></script>
  <script>
    // OAuth error from query (?error=...)
    const params = new URLSearchParams(location.search);
    if (params.get('error')) {
      const eEl = document.getElementById('oauth-error');
      eEl.textContent = '⚠ ' + params.get('error');
      eEl.style.display = 'block';
    }
    // Show social login buttons only if configured
    fetch('api/settings.php').then(r => r.json()).then(s => {
      let any = false;
      if (s.oauth_google_enabled === '1') {
        document.getElementById('btn-google').style.display = 'inline-flex';
        any = true;
      }
      if (s.oauth_tiktok_enabled === '1') {
        document.getElementById('btn-tiktok').style.display = 'inline-flex';
        any = true;
      }
      if (any) {
        document.getElementById('social-login').style.display = 'block';
        document.getElementById('social-divider').style.display = 'flex';
      }
    }).catch(() => {});

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fb = document.getElementById('login-feedback');
      const data = Object.fromEntries(new FormData(e.target).entries());
      fb.textContent = 'Signing in...';
      fb.className = 'form-feedback';
      try {
        const r = await fetch('api/auth.php?action=login', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const j = await r.json();
        if (j.success) {
          fb.textContent = '✨ Signed in! Redirecting…';
          fb.className = 'form-feedback success';
          const redirect = new URLSearchParams(location.search).get('redirect') || '/account.html';
          setTimeout(() => window.location.href = redirect, 600);
        } else {
          fb.textContent = j.error || 'Sign in failed';
          fb.className = 'form-feedback error';
        }
      } catch (err) {
        fb.textContent = 'Network error';
        fb.className = 'form-feedback error';
      }
    });
  </script>
</body>
</html>
