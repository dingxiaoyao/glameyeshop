<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Forgot Password · GlamEye</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css?v=DEPLOYHASH" />
  <!-- GLAMEYE_GA_TAG -->

</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand"><img src="images/logo.png?v=DEPLOYHASH" alt="GlamEye" class="brand-logo" width="160" height="36" /></a>
    </div>
  </header>
  <main class="container" style="max-width:480px; padding:4rem 1.25rem;">
    <div class="form-card">
      <h1>Forgot your password?</h1>
      <p class="subtitle">Enter your account email and we'll send you a reset link.</p>
      <form id="forgot-form" class="form-group">
        <label><span class="label-text">Email</span>
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <button type="submit" class="button button-primary button-block submit-btn">Send reset link</button>
        <p class="form-feedback" id="fb"></p>
      </form>
      <p class="text-center muted small" style="margin-top:1.5rem;">
        Remember it? <a href="/login.html">Sign in</a>
      </p>
    </div>
  </main>
  <footer class="site-footer">
    <div class="footer-bottom container">
      <p>© 2026 GlamEye, Inc. · <a href="/terms.html">Terms</a> · <a href="/privacy.html">Privacy</a></p>
    </div>
  </footer>
  <script src="js/app.js?v=DEPLOYHASH"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fb = document.getElementById('fb');
      const btn = e.target.querySelector('button');
      const email = e.target.email.value.trim();
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const r = await fetch('/api/auth.php?action=forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const j = await r.json();
        if (r.ok && j.success) {
          fb.textContent = j.message || 'Check your inbox for the reset link.';
          fb.className = 'form-feedback success';
          e.target.querySelector('input[name="email"]').disabled = true;
          btn.textContent = '✓ Sent';
        } else {
          fb.textContent = j.error || 'Could not send reset link';
          fb.className = 'form-feedback error';
          btn.disabled = false; btn.textContent = 'Send reset link';
        }
      } catch (err) {
        fb.textContent = 'Network error: ' + err.message;
        fb.className = 'form-feedback error';
        btn.disabled = false; btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
