<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account · GlamEye</title>
  <link rel="canonical" href="https://glameyeshop.com/signup.html" />
  <meta property="og:url" content="https://glameyeshop.com/signup.html" />
  <meta property="og:image" content="https://glameyeshop.com/images/products/hero-lash.jpg" />
  <meta property="og:site_name" content="GlamEye" />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css?v=DEPLOYHASH" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand">
        <img src="images/logo.png?v=DEPLOYHASH" alt="GlamEye" class="brand-logo" width="160" height="36" />
      </a>
      <nav class="site-nav"><a href="/">Back to Shop</a></nav>
    </div>
  </header>
  <main class="container" style="padding: 4rem 1rem;">
    <div class="form-card">
      <h1>Join GlamEye</h1>
      <p class="subtitle">Get 10% off your first order ✨</p>
      <p id="oauth-error" class="form-feedback error" style="display:none;"></p>
      <div id="social-login" class="form-group" style="display:none; margin-bottom:1.5rem;">
        <a href="api/oauth/google.php" id="btn-google"
           class="button button-outline button-block" style="display:none; gap:.5rem;">
          <span style="display:inline-block; width:18px; height:18px; background:#fff; color:#444; font-weight:700; border-radius:50%; line-height:18px; font-size:11px;">G</span>
          Sign up with Google
        </a>
        <a href="api/oauth/tiktok.php" id="btn-tiktok"
           class="button button-outline button-block" style="display:none; gap:.5rem;">
          <span style="font-size:1rem;">🎵</span> Sign up with TikTok
        </a>
      </div>
      <div id="social-divider" class="divider" style="display:none;">OR</div>
      <form id="signup-form" class="form-group">
        <div class="form-row">
          <label>
            <span class="label-text">First Name</span>
            <input type="text" name="first_name" required maxlength="100" autocomplete="given-name" />
          </label>
          <label>
            <span class="label-text">Last Name</span>
            <input type="text" name="last_name" maxlength="100" autocomplete="family-name" />
          </label>
        </div>
        <label>
          <span class="label-text">Email</span>
          <input type="email" name="email" required autocomplete="email" />
        </label>
        <label>
          <span class="label-text">Password (min 8 characters)</span>
          <input type="password" name="password" required minlength="8" autocomplete="new-password" />
        </label>
        <div class="checkbox-row">
          <input type="checkbox" name="is_subscribed" id="sub" value="1" checked />
          <label for="sub">Send me beauty tips, new launches & exclusive 10% off code</label>
        </div>
        <button type="submit" class="button button-primary button-block">Create Account</button>
        <p id="signup-feedback" class="form-feedback"></p>
      </form>
      <div class="divider">OR</div>
      <p class="text-center muted small">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </main>
  <script src="js/app.js?v=DEPLOYHASH"></script>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('error')) {
      const eEl = document.getElementById('oauth-error');
      eEl.textContent = '⚠ ' + params.get('error');
      eEl.style.display = 'block';
    }
    fetch('api/settings.php').then(r => r.json()).then(s => {
      let any = false;
      if (s.oauth_google_enabled === '1') {
        document.getElementById('btn-google').style.display = 'inline-flex'; any = true;
      }
      if (s.oauth_tiktok_enabled === '1') {
        document.getElementById('btn-tiktok').style.display = 'inline-flex'; any = true;
      }
      if (any) {
        document.getElementById('social-login').style.display = 'block';
        document.getElementById('social-divider').style.display = 'flex';
      }
    }).catch(() => {});

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fb = document.getElementById('signup-feedback');
      const data = Object.fromEntries(new FormData(e.target).entries());
      data.is_subscribed = data.is_subscribed ? 1 : 0;
      fb.textContent = 'Creating account...';
      fb.className = 'form-feedback';
      try {
        const r = await fetch('api/auth.php?action=signup', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const j = await r.json();
        if (j.success) {
          fb.textContent = '✨ Welcome! Redirecting…';
          fb.className = 'form-feedback success';
          setTimeout(() => window.location.href = '/account.html', 600);
        } else {
          fb.textContent = j.error || 'Sign up failed';
          fb.className = 'form-feedback error';
        }
      } catch (err) {
        fb.textContent = 'Network error';
        fb.className = 'form-feedback error';
      }
    });
  </script>
</body>
</html>
