<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Reset Password · GlamEye</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css?v=DEPLOYHASH" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand"><img src="images/logo.png?v=DEPLOYHASH" alt="GlamEye" class="brand-logo" width="160" height="36" /></a>
    </div>
  </header>
  <main class="container" style="max-width:480px; padding:4rem 1.25rem;">
    <div class="form-card">
      <h1>Set a new password</h1>
      <p class="subtitle">Choose a strong password (8+ characters).</p>
      <form id="reset-form" class="form-group">
        <label><span class="label-text">New password</span>
          <input type="password" name="new_password" required minlength="8" autocomplete="new-password" />
        </label>
        <label><span class="label-text">Confirm password</span>
          <input type="password" name="confirm" required minlength="8" autocomplete="new-password" />
        </label>
        <button type="submit" class="button button-primary button-block submit-btn">Update password</button>
        <p class="form-feedback" id="fb"></p>
      </form>
    </div>
  </main>
  <footer class="site-footer">
    <div class="footer-bottom container">
      <p>© 2026 GlamEye, Inc. · <a href="/terms.html">Terms</a> · <a href="/privacy.html">Privacy</a></p>
    </div>
  </footer>
  <script src="js/app.js?v=DEPLOYHASH"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const token = (params.get('token') || '').trim();
      const fb = document.getElementById('fb');
      const form = document.getElementById('reset-form');

      if (!token || !/^[a-f0-9]{48}$/.test(token)) {
        form.style.display = 'none';
        fb.hidden = false;
        fb.textContent = 'This reset link is invalid or malformed. Request a new one from the forgot-password page.';
        fb.className = 'form-feedback error';
        return;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPwd = form.new_password.value;
        const confirm = form.confirm.value;
        if (newPwd !== confirm) {
          fb.textContent = 'Passwords do not match';
          fb.className = 'form-feedback error';
          return;
        }
        const btn = form.querySelector('button');
        btn.disabled = true; btn.textContent = 'Updating…';
        try {
          const r = await fetch('/api/auth.php?action=reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, new_password: newPwd }),
          });
          const j = await r.json();
          if (r.ok && j.success) {
            fb.textContent = j.message || 'Password updated.';
            fb.className = 'form-feedback success';
            setTimeout(() => location.href = '/login.html?reset=1', 1500);
          } else {
            fb.textContent = j.error || 'Could not update password';
            fb.className = 'form-feedback error';
            btn.disabled = false; btn.textContent = 'Update password';
          }
        } catch (err) {
          fb.textContent = 'Network error: ' + err.message;
          fb.className = 'form-feedback error';
          btn.disabled = false; btn.textContent = 'Update password';
        }
      });
    })();
  </script>
</body>
</html>
