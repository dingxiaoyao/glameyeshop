<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GlamEye - 快速、安全的在线结账，支持 Stripe 和 PayPal。" />
  <meta name="robots" content="noindex,nofollow" />
  <title>GlamEye 结账</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="images/favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand">
        <img src="images/logo.png" alt="GlamEye" class="brand-logo" width="160" height="40" />
      </a>
      <nav class="site-nav">
        <a href="index.html">首页</a>
        <a href="index.html#products">产品</a>
      </nav>
    </div>
  </header>

  <main class="container checkout-page">
    <section class="checkout-panel">
      <h1>🛍️ 立即结账</h1>
      <p>填写收货信息，选择支付方式即可下单。</p>

      <!-- 购物车明细 -->
      <fieldset class="form-group">
        <legend>🎁 订单商品</legend>
        <div id="cart-list" class="cart-list">
          <p class="cart-empty">购物车为空。<a href="index.html#products">去挑选商品 →</a></p>
        </div>
      </fieldset>

      <form id="checkout-form" class="checkout-form" novalidate>
        <fieldset class="form-group">
          <legend>👤 顾客信息</legend>
          <label>姓名 <span class="required">*</span>
            <input type="text" name="customer_name" required maxlength="100" autocomplete="name" />
          </label>
          <label>邮箱地址 <span class="required">*</span>
            <input type="email" name="email" required autocomplete="email" />
          </label>
          <label>联系电话 <span class="required">*</span>
            <input type="tel" name="phone" pattern="[0-9\-\+\s\(\)]{5,32}" required autocomplete="tel" />
          </label>
        </fieldset>

        <fieldset class="form-group">
          <legend>📦 收货地址</legend>
          <label>详细地址 <span class="required">*</span>
            <input type="text" name="address" placeholder="街道、门牌号" required maxlength="255" autocomplete="street-address" />
          </label>
          <div class="form-row">
            <label>城市 <span class="required">*</span>
              <input type="text" name="city" required maxlength="100" autocomplete="address-level2" />
            </label>
            <label>邮编
              <input type="text" name="postal_code" maxlength="32" autocomplete="postal-code" />
            </label>
          </div>
          <label>备注
            <textarea name="notes" rows="2" maxlength="500" placeholder="可选：送货时间、特殊要求"></textarea>
          </label>
        </fieldset>

        <fieldset class="form-group">
          <legend>💳 支付方式</legend>
          <label class="radio-row">
            <input type="radio" name="payment_method" value="stripe" checked />
            Stripe（信用卡）
          </label>
          <label class="radio-row">
            <input type="radio" name="payment_method" value="paypal" />
            PayPal
          </label>
          <p class="payment-note" id="payment-note">您已选择 Stripe，提交后将进入信用卡支付。</p>
        </fieldset>

        <label class="checkbox-label">
          <input type="checkbox" name="agree_terms" required />
          我已阅读并同意《服务条款》和《隐私政策》
        </label>

        <button type="submit" class="button button-primary submit-btn">
          <span class="btn-text">提交订单 · 进入支付</span>
          <span class="btn-loading" hidden>处理中...</span>
        </button>
        <p class="form-feedback" id="checkout-feedback"></p>
        <p class="text-center muted small">✅ 所有交易通过加密连接保护</p>
      </form>
    </section>

    <aside class="checkout-summary">
      <h2>📦 订单摘要</h2>
      <div id="summary-items" class="summary-items"></div>
      <div class="summary-totals">
        <div class="summary-row"><span>小计</span><span id="subtotal">¥0</span></div>
        <div class="summary-row"><span>运费</span><span>¥0</span></div>
        <div class="summary-row"><span>税费</span><span>¥0</span></div>
        <div class="summary-row total"><span>总计</span><span id="total">¥0</span></div>
      </div>
      <a href="index.html#products" class="button button-outline" style="display:block; text-align:center; margin-top:1rem;">← 继续购物</a>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-copyright">© 2026 GlamEye. 版权所有。</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
