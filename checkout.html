<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Secure checkout for GlamEye lashes. Stripe + PayPal accepted." />
  <meta name="robots" content="noindex,nofollow" />
  <title>Checkout · GlamEye</title>
  <link rel="canonical" href="https://glameyeshop.com/checkout.html" />
  <meta property="og:url" content="https://glameyeshop.com/checkout.html" />
  <meta property="og:image" content="https://glameyeshop.com/images/products/hero-lash.jpg" />
  <meta property="og:site_name" content="GlamEye" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css?v=DEPLOYHASH" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand">
        <img src="images/logo.png?v=DEPLOYHASH" alt="GlamEye" class="brand-logo" width="160" height="36" />
      </a>
      <nav class="site-nav">
        <a href="/">Continue Shopping</a>
      </nav>
    </div>
  </header>

  <main class="container checkout-page">
    <div>
      <form id="checkout-form" class="checkout-form" novalidate>
        <fieldset class="form-group">
          <legend>Cart</legend>
          <div id="cart-list" class="cart-list">
            <p class="cart-empty">Your cart is empty. <a href="/#shop">Browse our collection →</a></p>
          </div>
        </fieldset>

        <fieldset class="form-group">
          <legend>Contact Info</legend>
          <label>
            <span class="label-text">Full Name <span class="required">*</span></span>
            <input type="text" name="customer_name" required maxlength="200" autocomplete="name" />
          </label>
          <label>
            <span class="label-text">Email <span class="required">*</span></span>
            <input type="email" name="email" required autocomplete="email" />
          </label>
          <label>
            <span class="label-text">Phone <span class="required">*</span></span>
            <input type="tel" name="phone" pattern="[0-9\-\+\s\(\)]{5,32}" required autocomplete="tel" />
          </label>
        </fieldset>

        <fieldset class="form-group">
          <legend>Shipping Address</legend>
          <label>
            <span class="label-text">Address Line 1 <span class="required">*</span></span>
            <input type="text" name="address" placeholder="Street address" required maxlength="255" autocomplete="address-line1" />
          </label>
          <label>
            <span class="label-text">Address Line 2</span>
            <input type="text" name="address_line2" placeholder="Apt, suite, etc. (optional)" maxlength="255" autocomplete="address-line2" />
          </label>
          <div class="form-row">
            <label>
              <span class="label-text">City <span class="required">*</span></span>
              <input type="text" name="city" required maxlength="100" autocomplete="address-level2" />
            </label>
            <label>
              <span class="label-text">State <span class="required">*</span></span>
              <select name="state" required autocomplete="address-level1">
                <option value="">Select state…</option>
                <option>AL</option><option>AK</option><option>AZ</option><option>AR</option>
                <option>CA</option><option>CO</option><option>CT</option><option>DE</option>
                <option>FL</option><option>GA</option><option>HI</option><option>ID</option>
                <option>IL</option><option>IN</option><option>IA</option><option>KS</option>
                <option>KY</option><option>LA</option><option>ME</option><option>MD</option>
                <option>MA</option><option>MI</option><option>MN</option><option>MS</option>
                <option>MO</option><option>MT</option><option>NE</option><option>NV</option>
                <option>NH</option><option>NJ</option><option>NM</option><option>NY</option>
                <option>NC</option><option>ND</option><option>OH</option><option>OK</option>
                <option>OR</option><option>PA</option><option>RI</option><option>SC</option>
                <option>SD</option><option>TN</option><option>TX</option><option>UT</option>
                <option>VT</option><option>VA</option><option>WA</option><option>WV</option>
                <option>WI</option><option>WY</option><option>DC</option>
              </select>
            </label>
          </div>
          <label>
            <span class="label-text">ZIP Code <span class="required">*</span></span>
            <input type="text" name="postal_code" pattern="[0-9]{5}(-[0-9]{4})?" placeholder="12345" required maxlength="10" autocomplete="postal-code" />
          </label>
          <label>
            <span class="label-text">Order Notes</span>
            <textarea name="notes" rows="2" maxlength="500" placeholder="Optional: delivery instructions, etc."></textarea>
          </label>
        </fieldset>

        <fieldset class="form-group">
          <legend>Payment Method</legend>
          <div class="checkbox-row">
            <input type="radio" name="payment_method" value="stripe" id="pay-stripe" checked />
            <label for="pay-stripe">💳 Credit / Debit Card · Apple Pay · Google Pay (Stripe)</label>
          </div>
          <div class="checkbox-row">
            <input type="radio" name="payment_method" value="paypal" id="pay-paypal" />
            <label for="pay-paypal">🅿️ PayPal</label>
          </div>
          <p class="payment-note" id="payment-note">Secure 256-bit SSL encryption. We never store your card details.</p>
        </fieldset>

        <div class="checkbox-row">
          <input type="checkbox" name="agree_terms" id="agree" required />
          <label for="agree">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</label>
        </div>

        <button type="submit" class="button button-primary button-block submit-btn" style="margin-top:1.5rem; padding:1.1rem;">
          <span class="btn-text">Place Order · Continue to Payment</span>
          <span class="btn-loading" hidden>Processing…</span>
        </button>
        <p class="form-feedback" id="checkout-feedback"></p>
      </form>
    </div>

    <aside class="checkout-summary">
      <h2>Order Summary</h2>
      <div id="summary-items" class="summary-items"></div>
      <div>
        <div class="summary-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
        <div class="summary-row"><span>Shipping <small>(free over $50)</small></span><span id="shipping">$0.00</span></div>
        <div class="summary-row"><span>Tax</span><span id="tax">$0.00</span></div>
        <div class="summary-row total"><span>Total</span><span id="total">$0.00</span></div>
      </div>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom container">
      <p>© 2026 GlamEye, Inc. · Secure Checkout</p>
    </div>
  </footer>

  <script src="js/app.js?v=DEPLOYHASH"></script>
  <script src="js/checkout.js?v=DEPLOYHASH"></script>
</body>
</html>
