<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Order History · GlamEye</title>
  <link rel="canonical" href="https://glameyeshop.com/account-orders.html" />
  <meta property="og:url" content="https://glameyeshop.com/account-orders.html" />
  <meta property="og:image" content="https://glameyeshop.com/images/products/hero-lash.jpg" />
  <meta property="og:site_name" content="GlamEye" />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css?v=DEPLOYHASH" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand">
        <img src="images/logo.png" alt="GlamEye" class="brand-logo" width="160" height="36" />
      </a>
      <nav class="site-nav"><a href="/">Continue Shopping</a></nav>
    </div>
  </header>
  <main class="container account-page">
    <aside class="account-sidebar">
      <h3>My Account</h3>
      <nav class="account-nav">
        <a href="account.html">Dashboard</a>
        <a href="account-orders.html" class="active">Order History</a>
        <a href="account-wishlist.html">Wishlist</a>
        <a href="account-settings.html">Settings</a>
        <a href="#" id="sidebar-logout">Sign Out</a>
      </nav>
    </aside>
    <section class="account-content">
      <h1>Order History</h1>
      <div id="orders-container" style="margin-top:2rem;"><p class="muted">Loading…</p></div>
    </section>
  </main>
  <script src="js/app.js?v=DEPLOYHASH"></script>
  <script>
    (async () => {
      const u = await window.GlamEye.Auth.fetchMe();
      if (!u) { window.location.href = '/login.html?redirect=/account-orders.html'; return; }
      const container = document.getElementById('orders-container');
      try {
        const r = await fetch('api/my-orders.php', { credentials: 'include' });
        const j = await r.json();
        const orders = j.orders || [];
        if (orders.length === 0) {
          container.innerHTML = '<p class="muted">You haven\'t placed any orders yet. <a href="/#shop">Browse our collection →</a></p>';
          return;
        }
        const esc = window.GlamEye.Fmt.escape;
        const m = window.GlamEye.Fmt.money;
        const STEPS = ['paid','processing','shipped','delivered'];
        const STEP_LABELS = { paid:'💳 Paid', processing:'📦 Processing', shipped:'🚚 Shipped', delivered:'🏠 Delivered' };
        function timeline(o) {
          const idx = STEPS.indexOf(o.status);
          if (o.status === 'cancelled' || o.status === 'refunded') {
            return `<div style="padding:.5rem .75rem; background:var(--bg); border-left:3px solid var(--error); border-radius:4px; margin:.75rem 0;">
              <strong style="color:var(--error);">${esc(o.status === 'cancelled' ? 'Cancelled' : 'Refunded')}</strong>
            </div>`;
          }
          const dots = STEPS.map((s, i) => `
            <div style="flex:1; text-align:center; position:relative;">
              <div style="width:24px; height:24px; border-radius:50%; margin: 0 auto;
                          background: ${i <= idx ? 'var(--gold)' : 'var(--bg)'};
                          border: 2px solid ${i <= idx ? 'var(--gold)' : 'var(--border)'};
                          color: var(--bg); font-weight:700; font-size:11px; line-height:20px;">
                ${i <= idx ? '✓' : ''}
              </div>
              <small style="display:block; margin-top:.4rem; color: ${i <= idx ? 'var(--gold)' : 'var(--text-muted)'};">${STEP_LABELS[s]}</small>
              ${i < STEPS.length - 1 ? `<div style="position:absolute; top:11px; left:60%; right:-40%; height:2px; background:${i < idx ? 'var(--gold)' : 'var(--border)'};"></div>` : ''}
            </div>`).join('');
          return `<div style="display:flex; align-items:flex-start; margin: 1.5rem 0 1rem;">${dots}</div>`;
        }
        function trackingBlock(o) {
          let html = '';
          if (o.carrier && o.tracking_number) {
            const url = o.tracking_url || '#';
            html += `<div style="padding:.6rem .75rem; background:var(--bg); border-left:3px solid var(--gold); border-radius:4px; margin: .75rem 0;">
              <strong style="color:var(--gold);">📦 ${esc(o.carrier)}</strong>
              <a href="${esc(url)}" target="_blank" rel="noopener" style="color:var(--cream); margin-left:.5rem;">
                ${esc(o.tracking_number)} ↗
              </a>
              ${o.estimated_delivery ? `<span class="muted small" style="margin-left:.75rem;">Est. delivery: ${esc(o.estimated_delivery)}</span>` : ''}
            </div>`;
          }
          if ((o.tracking_events || []).length) {
            html += `<details style="margin-top:.5rem;"><summary style="cursor:pointer; color:var(--gold);">View tracking history (${o.tracking_events.length})</summary>
              <div style="margin-top:.5rem;">
                ${o.tracking_events.map(e => `
                  <div style="padding:.5rem .75rem; background:var(--bg); border-left:2px solid var(--gold); border-radius:4px; margin-bottom:.4rem;">
                    <div><strong style="color:var(--cream);">${esc(e.status)}</strong> · <small class="muted">${esc(e.occurred_at)}</small></div>
                    ${e.location ? `<div><small>📍 ${esc(e.location)}</small></div>` : ''}
                    ${e.description ? `<div><small class="muted">${esc(e.description)}</small></div>` : ''}
                  </div>`).join('')}
              </div></details>`;
          }
          return html;
        }
        container.innerHTML = orders.map((o) => `
          <div style="padding:1.5rem; border:1px solid var(--border); border-radius: 12px; margin-bottom: 1rem; background: var(--black);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.5rem; flex-wrap:wrap; gap:.5rem;">
              <div>
                <strong style="color:var(--gold);">Order #${o.id}</strong>
                ${o.is_test == 1 ? '<span class="status-badge status-pending" style="margin-left:.5rem; font-size:9px;">TEST</span>' : ''}
                <span class="muted small" style="margin-left: 1rem;">${esc(o.created_at)}</span>
              </div>
              <span class="product-badge ${['paid','processing','shipped','delivered'].includes(o.status) ? 'bestseller' : ''}">${esc(o.status)}</span>
            </div>
            ${timeline(o)}
            ${trackingBlock(o)}
            ${(o.items || []).map((i) => `<div class="summary-row"><span>${esc(i.product_name)} × ${i.quantity}</span><span>${m(i.line_total)}</span></div>`).join('')}
            <div class="summary-row total"><span>Total</span><span>${m(o.amount)} ${esc(o.currency)}</span></div>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = '<p style="color:var(--error)">Failed to load orders.</p>';
      }
    })();
    document.getElementById('sidebar-logout').addEventListener('click', (e) => { e.preventDefault(); window.GlamEye.Auth.logout(); });
  </script>
</body>
</html>
