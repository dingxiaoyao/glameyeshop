<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Settings · GlamEye</title>
  <link rel="canonical" href="https://glameyeshop.com/account-settings.html" />
  <meta property="og:url" content="https://glameyeshop.com/account-settings.html" />
  <meta property="og:image" content="https://glameyeshop.com/images/products/hero-lash.jpg" />
  <meta property="og:site_name" content="GlamEye" />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css?v=DEPLOYHASH" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand"><img src="images/logo.png" alt="GlamEye" class="brand-logo" width="160" height="36" /></a>
      <nav class="site-nav"><a href="/">Continue Shopping</a></nav>
    </div>
  </header>
  <main class="container account-page">
    <aside class="account-sidebar">
      <h3>My Account</h3>
      <nav class="account-nav">
        <a href="account.html">Dashboard</a>
        <a href="account-orders.html">Order History</a>
        <a href="account-wishlist.html">Wishlist</a>
        <a href="account-settings.html" class="active">Settings</a>
        <a href="#" id="sidebar-logout">Sign Out</a>
      </nav>
    </aside>
    <section class="account-content" style="max-width:600px;">
      <h1>Profile Settings</h1>
      <form id="profile-form" class="form-group" style="margin-top:2rem;">
        <div class="form-row">
          <label>
            <span class="label-text">First Name</span>
            <input type="text" name="first_name" id="first_name" required maxlength="100" />
          </label>
          <label>
            <span class="label-text">Last Name</span>
            <input type="text" name="last_name" id="last_name" maxlength="100" />
          </label>
        </div>
        <label>
          <span class="label-text">Email (read-only)</span>
          <input type="email" id="email" disabled />
        </label>
        <label>
          <span class="label-text">Phone</span>
          <input type="tel" name="phone" id="phone" />
        </label>
        <div class="checkbox-row">
          <input type="checkbox" name="is_subscribed" id="is_subscribed" value="1" />
          <label for="is_subscribed">Receive newsletter & exclusive offers</label>
        </div>
        <button type="submit" class="button button-primary">Save Changes</button>
        <p id="profile-feedback" class="form-feedback"></p>
      </form>

      <hr style="border:none; border-top:1px solid var(--border); margin: 2.5rem 0;">

      <h2 style="font-size:1.5rem;">Change Password</h2>
      <form id="password-form" class="form-group" style="margin-top:1rem;">
        <label>
          <span class="label-text">Current Password</span>
          <input type="password" name="current_password" required minlength="8" />
        </label>
        <label>
          <span class="label-text">New Password (min 8 chars)</span>
          <input type="password" name="new_password" required minlength="8" />
        </label>
        <button type="submit" class="button button-secondary">Update Password</button>
        <p id="password-feedback" class="form-feedback"></p>
      </form>
    </section>
  </main>
  <script src="js/app.js?v=DEPLOYHASH"></script>
  <script>
    (async () => {
      const u = await window.GlamEye.Auth.fetchMe();
      if (!u) { window.location.href = '/login.html?redirect=/account-settings.html'; return; }
      document.getElementById('first_name').value = u.first_name || '';
      document.getElementById('last_name').value  = u.last_name  || '';
      document.getElementById('email').value      = u.email;
      document.getElementById('phone').value      = u.phone || '';
      document.getElementById('is_subscribed').checked = !!u.is_subscribed;
    })();

    async function postJson(url, body, fbId, successMsg) {
      const fb = document.getElementById(fbId);
      fb.textContent = 'Saving...'; fb.className = 'form-feedback';
      try {
        const r = await fetch(url, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const j = await r.json();
        if (j.success) { fb.textContent = successMsg; fb.className = 'form-feedback success'; }
        else { fb.textContent = j.error || 'Failed'; fb.className = 'form-feedback error'; }
      } catch (e) { fb.textContent = 'Network error'; fb.className = 'form-feedback error'; }
    }

    document.getElementById('profile-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const body = {
        first_name: fd.get('first_name'),
        last_name:  fd.get('last_name'),
        phone:      fd.get('phone'),
        is_subscribed: fd.get('is_subscribed') ? 1 : 0,
      };
      postJson('api/auth.php?action=update', body, 'profile-feedback', '✅ Profile updated');
    });
    document.getElementById('password-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      postJson('api/auth.php?action=change-password', {
        current_password: fd.get('current_password'),
        new_password:     fd.get('new_password'),
      }, 'password-feedback', '✅ Password updated');
      e.target.reset();
    });
    document.getElementById('sidebar-logout').addEventListener('click', (e) => { e.preventDefault(); window.GlamEye.Auth.logout(); });
  </script>
</body>
</html>
