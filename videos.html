<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GlamEye on TikTok - watch tutorials, reviews, and lash transformations from creators." />
  <title>TikTok · GlamEye</title>
  <link rel="canonical" href="https://glameyeshop.com/videos.html" />
  <meta property="og:url" content="https://glameyeshop.com/videos.html" />
  <meta property="og:image" content="https://glameyeshop.com/images/products/hero-lash.jpg" />
  <meta property="og:site_name" content="GlamEye" />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="css/styles.css?v=DEPLOYHASH" />
  <style>
    .videos-grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      margin-top: 3rem;
    }
    .video-card {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all .3s;
    }
    .video-card:hover {
      transform: translateY(-4px);
      border-color: var(--gold-dark);
      box-shadow: var(--shadow-lg);
    }
    .video-embed-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 9/16;
      background: var(--bg);
      overflow: hidden;
    }
    .video-embed-wrapper iframe {
      width: 100%; height: 100%; border: 0;
    }
    .video-info { padding: 1.25rem; }
    .video-title { color: var(--cream); font-family: var(--serif); font-size: 1.1rem; margin-bottom: .5rem; }
    .video-handle { color: var(--gold); font-size: .85rem; }
    .video-actions {
      display: flex; gap: .5rem; margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="top-bar">✨ Free U.S. Shipping <strong>$50+</strong> &nbsp;·&nbsp; 30-Day Returns &nbsp;·&nbsp; Cruelty-Free</div>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand"><img src="images/logo.png?v=DEPLOYHASH" alt="GlamEye" class="brand-logo" /></a>
      <button class="nav-toggle"><span></span><span></span><span></span></button>
      <nav class="site-nav">
        <a href="/">Home</a>
        <a href="shop.html">Shop</a>
        <a href="videos.html" class="active">TikTok</a>
        <a href="about.html">Story</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="nav-actions">
        <a href="account.html" class="icon-button">👤</a>
        <a href="cart.html" class="icon-button">🛍 <span class="cart-count" id="cart-count">0</span></a>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 4rem 1.25rem;">
    <div style="text-align:center; max-width: 720px; margin: 0 auto 2rem;">
      <span class="eyebrow">As Seen On TikTok</span>
      <h1>The GlamEye Community</h1>
      <div class="divider-gold"></div>
      <p class="muted">Real customers, real reviews, real transformations. Tag <strong style="color:var(--gold);">@glameye</strong> for a chance to be featured.</p>
      <a href="#" id="follow-tiktok-btn" class="button button-primary" style="margin-top:1.5rem;" target="_blank" rel="noopener">
        ▶ Follow on TikTok
      </a>
    </div>

    <div id="videos-container" class="videos-grid">
      <p class="muted text-center" style="grid-column:1/-1;">Loading videos…</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom container"><p>© 2026 GlamEye, Inc.</p></div>
  </footer>

  <script src="js/app.js?v=DEPLOYHASH"></script>
  <script async src="https://www.tiktok.com/embed.js"></script>
  <script>
    (async () => {
      // 拉社交配置
      const settings = await fetch('api/settings.php').then(r => r.json()).catch(() => ({}));
      if (settings.social_tiktok) {
        document.getElementById('follow-tiktok-btn').href = settings.social_tiktok;
      }

      // 拉视频列表
      const container = document.getElementById('videos-container');
      try {
        const r = await fetch('api/videos.php?limit=24');
        const j = await r.json();
        const videos = j.videos || [];
        if (videos.length === 0) {
          container.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1;">
              <div class="icon">🎬</div>
              <h3 style="color:var(--cream);">No videos yet</h3>
              <p class="muted">Check back soon for tutorials and reviews from our creators.</p>
            </div>`;
          return;
        }
        const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
          ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        container.innerHTML = videos.map((v) => `
          <article class="video-card">
            <div class="video-embed-wrapper">
              <iframe src="https://www.tiktok.com/embed/v2/${esc(v.video_id)}" allowfullscreen scrolling="no"
                      allow="encrypted-media;"></iframe>
            </div>
            <div class="video-info">
              <h3 class="video-title">${esc(v.title || 'Untitled')}</h3>
              <p class="video-handle">@${esc(v.creator_handle)}</p>
              <div class="video-actions">
                <a href="${esc(v.video_url)}" target="_blank" rel="noopener" class="button button-outline button-sm">View on TikTok</a>
              </div>
            </div>
          </article>
        `).join('');
      } catch (e) {
        container.innerHTML = '<p style="color:var(--error); grid-column:1/-1;">Failed to load videos.</p>';
      }
    })();
  </script>
</body>
</html>
