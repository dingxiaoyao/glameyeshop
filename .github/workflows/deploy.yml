# ============================================================
# .github/workflows/deploy.yml
# 每次推送到 main 分支自动部署到 Vultr 服务器
# ============================================================

name: Deploy GLAMEYE to Vultr

on:
  push:
    branches:
      - main
  workflow_dispatch:   # 允许手动触发

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PHP files
        run: |
          for f in api/*.php admin/*.php; do
            php -l "$f" || exit 1
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to Vultr
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     22
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            # git 2.35+ 安全机制：声明此目录可信
            git config --global --add safe.directory "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            git fetch origin
            git reset --hard origin/main
            # 同步文件 owner 给 www-data，PHP-FPM 才能读
            chown -R www-data:www-data "$DEPLOY_PATH"
            # 如果 schema 有更新，应用迁移（幂等：列已存在则忽略）
            if [ -f database/setup.sql ]; then
              mysql --protocol=socket -u root glameyeshop < database/setup.sql 2>/dev/null || true
            fi
            # PHP opcache 失效，下次请求会重新编译；如有需要可重启 fpm
            # systemctl reload php8.1-fpm
            echo "✅ GLAMEYE deployed at $(date) → $(git rev-parse --short HEAD)"
