name: Deploy GLAMEYE to Vultr

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PHP files
        run: |
          # 递归 lint api/ 和 admin/ 下所有 .php(包括 api/lib/, api/oauth/ 等子目录)
          find api admin -type f -name '*.php' | while read f; do
            php -l "$f" || exit 1
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to Vultr
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     22
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            git config --global --add safe.directory "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            git fetch origin
            git reset --hard origin/main

            # Cache busting: 把 HTML 里的 ?v=DEPLOYHASH 替换成 git short hash
            # 用户浏览器看到 url 变化会拉新版,旧 css/js 不再被缓存复用
            DEPLOY_HASH=$(git rev-parse --short HEAD)
            find . -maxdepth 2 -name "*.html" -type f -exec sed -i "s/?v=DEPLOYHASH/?v=${DEPLOY_HASH}/g" {} \;
            echo "Cache busting: ?v=${DEPLOY_HASH}"

            # Google Analytics 4:从 DB 拿 ga_measurement_id,替换 <!-- GLAMEYE_GA_TAG --> 占位符
            # admin 在后台改 ID 后,push 一次空 commit(或直接 push)即可重新部署 GA tag
            GA_ID=""
            if [ -f /etc/glameye/db.conf ]; then
              . /etc/glameye/db.conf
              GA_ID=$(mysql -h "${DB_HOST:-127.0.0.1}" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -sN -e "SELECT \`value\` FROM site_settings WHERE \`key\`='ga_measurement_id' LIMIT 1" 2>/dev/null || echo "")
            fi
            if [ -n "$GA_ID" ] && echo "$GA_ID" | grep -qE '^G-[A-Z0-9]+$'; then
              GA_FILE=$(mktemp)
              printf '<script async src="https://www.googletagmanager.com/gtag/js?id=%s"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","%s");</script>' "$GA_ID" "$GA_ID" > "$GA_FILE"
              find . -maxdepth 2 -name "*.html" -type f | while read -r f; do
                if grep -q "GLAMEYE_GA_TAG" "$f"; then
                  sed -i "/GLAMEYE_GA_TAG/r $GA_FILE" "$f"
                  sed -i "/GLAMEYE_GA_TAG/d" "$f"
                fi
              done
              rm -f "$GA_FILE"
              echo "✓ Injected GA tag $GA_ID into HTML files"
            else
              # 没配置 → 删除占位符避免泄露
              find . -maxdepth 2 -name "*.html" -type f -exec sed -i "/GLAMEYE_GA_TAG/d" {} \;
              echo "✓ GA not configured, placeholders removed"
            fi

            chown -R www-data:www-data "$DEPLOY_PATH"

            # Uploads 目录（用户文件持久化，git 不管）
            mkdir -p "$DEPLOY_PATH/uploads"
            chown -R www-data:www-data "$DEPLOY_PATH/uploads"
            chmod 755 "$DEPLOY_PATH/uploads"

            # PHP-FPM 调大上传限制（200M 视频）
            POOL_CONF=$(ls /etc/php/*/fpm/pool.d/www.conf 2>/dev/null | head -1)
            if [ -n "$POOL_CONF" ] && ! grep -q 'GLAMEYE_UPLOAD' "$POOL_CONF"; then
              {
                printf '\n; GLAMEYE_UPLOAD\n'
                printf 'php_admin_value[upload_max_filesize] = 210M\n'
                printf 'php_admin_value[post_max_size]       = 220M\n'
                printf 'php_admin_value[memory_limit]        = 256M\n'
                printf 'php_admin_value[max_execution_time]  = 120\n'
              } >> "$POOL_CONF"
              PHP_FPM=$(systemctl list-unit-files --type=service --no-legend | awk '/^php[0-9.]+-fpm\.service/{print $1; exit}')
              [ -n "$PHP_FPM" ] && systemctl restart "$PHP_FPM"
            fi

            # nginx 调大 client_max_body_size（如果 vhost 没配过）
            if ! grep -q 'client_max_body_size' /etc/nginx/sites-enabled/glameye 2>/dev/null; then
              sed -i '/server_name.*\b173\.199\b.*;/a\    client_max_body_size 220M;' /etc/nginx/sites-enabled/glameye 2>/dev/null || true
              nginx -t && systemctl reload nginx 2>/dev/null || true
            fi

            # ============================================================
            # P0#3: 安全 DB 凭据自动配置 (零额外配置)
            # 第一次部署:生成 32 字符随机密码 + 创建独立 DB 用户 + 写 /etc/glameye/db.conf
            # 后续部署:读 /etc/glameye/db.conf 复用现有凭据
            # PHP-FPM env 注入,跑 setup.sql 不再用 root
            # ============================================================
            DB_CONF=/etc/glameye/db.conf
            if [ ! -f "$DB_CONF" ]; then
              mkdir -p /etc/glameye
              GENPASS=$(openssl rand -base64 36 | tr -d '=+/' | head -c 32)
              printf 'DB_HOST=127.0.0.1\nDB_NAME=glameyeshop\nDB_USER=glameye_app\nDB_PASS=%s\n' "$GENPASS" > "$DB_CONF"
              chmod 600 "$DB_CONF"
              chown root:www-data "$DB_CONF" 2>/dev/null || true
              # 创建 MySQL 用户(root socket auth 一次性使用,之后 PHP 不再用 root)
              SQL_CREATE="CREATE DATABASE IF NOT EXISTS glameyeshop CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; CREATE USER IF NOT EXISTS 'glameye_app'@'localhost' IDENTIFIED BY '$GENPASS'; ALTER USER 'glameye_app'@'localhost' IDENTIFIED BY '$GENPASS'; GRANT ALL PRIVILEGES ON glameyeshop.* TO 'glameye_app'@'localhost'; FLUSH PRIVILEGES;"
              mysql --protocol=socket -u root -e "$SQL_CREATE"
              echo "✓ Created dedicated MySQL user 'glameye_app' with random 32-char password"
            else
              echo "✓ Using existing DB credentials at $DB_CONF"
            fi

            # 读取凭据进 shell vars
            # shellcheck disable=SC1090
            . "$DB_CONF"
            export DB_HOST DB_NAME DB_USER DB_PASS

            # Schema (CREATE IF NOT EXISTS - 幂等) — 用独立用户跑,不再 root
            if [ -f database/setup.sql ]; then
              mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" < database/setup.sql 2>/dev/null || true
            fi

            # 增量 ALTER（每条独立，列已存在时忽略）
            for sql in \
              "ALTER TABLE orders ADD COLUMN user_id INT DEFAULT NULL AFTER id" \
              "ALTER TABLE orders ADD COLUMN address_line2 VARCHAR(255) DEFAULT '' AFTER address_line" \
              "ALTER TABLE orders ADD COLUMN state VARCHAR(64) NOT NULL DEFAULT '' AFTER city" \
              "ALTER TABLE orders ADD COLUMN subtotal DECIMAL(10,2) NOT NULL DEFAULT 0 AFTER quantity" \
              "ALTER TABLE orders ADD COLUMN shipping DECIMAL(10,2) NOT NULL DEFAULT 0 AFTER subtotal" \
              "ALTER TABLE orders ADD COLUMN tax DECIMAL(10,2) NOT NULL DEFAULT 0 AFTER shipping" \
              "ALTER TABLE orders ADD COLUMN currency VARCHAR(3) NOT NULL DEFAULT 'USD' AFTER amount" \
              "ALTER TABLE orders ADD COLUMN payment_session_id VARCHAR(255) DEFAULT NULL AFTER payment_method" \
              "ALTER TABLE orders ADD COLUMN notes TEXT NULL AFTER status" \
              "ALTER TABLE orders ADD COLUMN updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP" \
              "ALTER TABLE orders ADD INDEX idx_user_id (user_id)" \
              "ALTER TABLE orders ADD INDEX idx_status (status)" \
              "ALTER TABLE order_items ADD COLUMN product_id INT DEFAULT NULL AFTER order_id" \
              "ALTER TABLE order_items ADD COLUMN sku VARCHAR(64) DEFAULT '' AFTER product_name" \
              "ALTER TABLE wholesale_leads ADD COLUMN phone VARCHAR(64) DEFAULT NULL AFTER email" \
              "ALTER TABLE wholesale_leads ADD COLUMN message TEXT DEFAULT NULL AFTER phone" \
              "ALTER TABLE wholesale_leads ADD COLUMN status VARCHAR(50) NOT NULL DEFAULT 'new' AFTER message" \
              "ALTER TABLE products ADD COLUMN style VARCHAR(50) DEFAULT '' AFTER category" \
              "ALTER TABLE products ADD COLUMN length_mm INT DEFAULT NULL AFTER description" \
              "ALTER TABLE products ADD COLUMN band_type VARCHAR(50) DEFAULT 'cotton' AFTER length_mm" \
              "ALTER TABLE products ADD COLUMN reusable_count INT DEFAULT NULL AFTER band_type" \
              "ALTER TABLE products ADD COLUMN gallery_urls TEXT DEFAULT NULL AFTER image_url" \
              "ALTER TABLE products ADD COLUMN is_bestseller TINYINT(1) NOT NULL DEFAULT 0" \
              "ALTER TABLE products ADD COLUMN is_new TINYINT(1) NOT NULL DEFAULT 0" \
              "ALTER TABLE users MODIFY COLUMN password_hash VARCHAR(255) NULL" \
              "ALTER TABLE users ADD COLUMN avatar_url VARCHAR(500) DEFAULT NULL" \
              "ALTER TABLE users ADD COLUMN is_test_account TINYINT(1) NOT NULL DEFAULT 0" \
              "ALTER TABLE users ADD COLUMN oauth_provider VARCHAR(32) DEFAULT NULL" \
              "ALTER TABLE users ADD COLUMN oauth_id VARCHAR(255) DEFAULT NULL" \
              "ALTER TABLE users ADD UNIQUE KEY uniq_oauth (oauth_provider, oauth_id)" \
              "ALTER TABLE orders ADD COLUMN carrier VARCHAR(64) DEFAULT NULL" \
              "ALTER TABLE orders ADD COLUMN tracking_number VARCHAR(128) DEFAULT NULL" \
              "ALTER TABLE orders ADD COLUMN tracking_url VARCHAR(500) DEFAULT NULL" \
              "ALTER TABLE orders ADD COLUMN shipped_at DATETIME DEFAULT NULL" \
              "ALTER TABLE orders ADD COLUMN delivered_at DATETIME DEFAULT NULL" \
              "ALTER TABLE orders ADD COLUMN estimated_delivery DATE DEFAULT NULL" \
              "ALTER TABLE orders ADD COLUMN is_test TINYINT(1) NOT NULL DEFAULT 0" \
              "ALTER TABLE orders ADD INDEX idx_tracking (tracking_number)" \
              "CREATE TABLE IF NOT EXISTS order_tracking_events (
                  id INT AUTO_INCREMENT PRIMARY KEY,
                  order_id INT NOT NULL,
                  status VARCHAR(50) NOT NULL,
                  location VARCHAR(255) DEFAULT NULL,
                  description TEXT,
                  occurred_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  INDEX idx_order_id (order_id),
                  INDEX idx_occurred (occurred_at)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4" \
              "CREATE TABLE IF NOT EXISTS support_threads (
                  id INT AUTO_INCREMENT PRIMARY KEY,
                  customer_email VARCHAR(255) NOT NULL,
                  customer_name VARCHAR(120) DEFAULT '',
                  user_id INT DEFAULT NULL,
                  subject VARCHAR(200) DEFAULT '',
                  status VARCHAR(20) NOT NULL DEFAULT 'open',
                  last_sender VARCHAR(20) DEFAULT 'customer',
                  unread_for_admin TINYINT(1) NOT NULL DEFAULT 1,
                  unread_for_customer TINYINT(1) NOT NULL DEFAULT 0,
                  thread_token CHAR(32) NOT NULL,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                  UNIQUE KEY uniq_token (thread_token),
                  INDEX idx_email (customer_email),
                  INDEX idx_status (status, updated_at),
                  INDEX idx_user (user_id)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4" \
              "CREATE TABLE IF NOT EXISTS support_messages (
                  id INT AUTO_INCREMENT PRIMARY KEY,
                  thread_id INT NOT NULL,
                  sender VARCHAR(20) NOT NULL,
                  body TEXT NOT NULL,
                  admin_user VARCHAR(64) DEFAULT NULL,
                  created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
                  INDEX idx_thread (thread_id, created_at),
                  CONSTRAINT fk_msg_thread FOREIGN KEY (thread_id) REFERENCES support_threads(id) ON DELETE CASCADE
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4" \
              "CREATE TABLE IF NOT EXISTS email_log (
                  id INT AUTO_INCREMENT PRIMARY KEY,
                  to_email VARCHAR(255) NOT NULL,
                  subject VARCHAR(255) NOT NULL,
                  mode VARCHAR(20) DEFAULT NULL,
                  ok TINYINT(1) NOT NULL DEFAULT 0,
                  error TEXT,
                  created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
                  INDEX idx_created (created_at)
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4" \
              "INSERT IGNORE INTO site_settings (\`key\`, \`value\`) VALUES
                ('admin_email',         ''),
                ('email_from_address',  'noreply@glameyeshop.com'),
                ('email_from_name',     'GlamEye Support'),
                ('smtp_host',           ''),
                ('smtp_port',           '587'),
                ('smtp_user',           ''),
                ('smtp_pass',           ''),
                ('smtp_secure',         'tls')" \
            ; do
              mysql -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -e "$sql" 2>/dev/null || true
            done

            # nginx：把 /robots.txt 重写到 /robots.php（动态）
            if ! grep -q 'rewrite ^/robots.txt' /etc/nginx/sites-enabled/glameye 2>/dev/null; then
              sed -i '/server_name.*\b173\.199\b.*;/a\    rewrite ^/robots\\.txt$ /robots.php last;' /etc/nginx/sites-enabled/glameye 2>/dev/null || true
              nginx -t && systemctl reload nginx 2>/dev/null || true
            fi

            # P1#17: nginx 把 /sitemap.xml 重写到 /sitemap.php(动态从 DB 拿产品)
            if ! grep -q 'rewrite ^/sitemap.xml' /etc/nginx/sites-enabled/glameye 2>/dev/null; then
              sed -i '/server_name.*\b173\.199\b.*;/a\    rewrite ^/sitemap\\.xml$ /sitemap.php last;' /etc/nginx/sites-enabled/glameye 2>/dev/null || true
              nginx -t && systemctl reload nginx 2>/dev/null || true
            fi
            # 删除老 sitemap.xml(若存在)— nginx try_files 会用静态文件覆盖 rewrite
            rm -f "$DEPLOY_PATH/sitemap.xml" 2>/dev/null || true

            # P2 安全头(nginx):include 静态片段,reload nginx
            SEC_HEADERS=/etc/nginx/snippets/glameye-security-headers.conf
            mkdir -p /etc/nginx/snippets
            CSP_DIRECTIVES="default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.tiktok.com https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://images.unsplash.com https://*.tiktokcdn-us.com https://*.tiktokcdn.com https://scontent-*.cdninstagram.com https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com; font-src 'self' https://fonts.gstatic.com; frame-src https://js.stripe.com https://hooks.stripe.com https://www.tiktok.com; connect-src 'self' https://api.stripe.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com; form-action 'self' https://checkout.stripe.com; base-uri 'self'; frame-ancestors 'self'; upgrade-insecure-requests"
            : > "$SEC_HEADERS"
            echo '# Auto-generated by GitHub Actions' >> "$SEC_HEADERS"
            echo 'add_header X-Content-Type-Options "nosniff" always;' >> "$SEC_HEADERS"
            echo 'add_header X-Frame-Options "SAMEORIGIN" always;' >> "$SEC_HEADERS"
            echo 'add_header Referrer-Policy "strict-origin-when-cross-origin" always;' >> "$SEC_HEADERS"
            echo 'add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;' >> "$SEC_HEADERS"
            echo 'add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;' >> "$SEC_HEADERS"
            printf 'add_header Content-Security-Policy "%s" always;\n' "$CSP_DIRECTIVES" >> "$SEC_HEADERS"
            if ! grep -q 'glameye-security-headers' /etc/nginx/sites-enabled/glameye 2>/dev/null; then
              sed -i '/server_name.*\b173\.199\b.*;/a\    include /etc/nginx/snippets/glameye-security-headers.conf;' /etc/nginx/sites-enabled/glameye 2>/dev/null || true
              nginx -t && systemctl reload nginx 2>/dev/null || true
              echo "✓ Security headers (CSP/HSTS) added to nginx"
            fi

            # ============================================================
            # P0#3: PHP-FPM env 注入 DB 凭据 + APP_ENV=production
            # PHP 进程读 getenv() 拿不到 secret,只能等 PHP-FPM 重启
            # 用 env[KEY] = value 语法(www.conf),不要用 php_admin_value
            # ============================================================
            POOL_CONF=$(ls /etc/php/*/fpm/pool.d/www.conf 2>/dev/null | head -1)
            if [ -n "$POOL_CONF" ]; then
              # 移除旧的 GLAMEYE_DB 块(idempotent — 改密码后下次部署自动同步)
              sed -i '/; GLAMEYE_DB_BEGIN/,/; GLAMEYE_DB_END/d' "$POOL_CONF"
              {
                printf '\n; GLAMEYE_DB_BEGIN (managed by deploy.yml, do not edit)\n'
                printf 'env[APP_ENV] = production\n'
                printf 'env[DB_HOST] = %s\n' "$DB_HOST"
                printf 'env[DB_NAME] = %s\n' "$DB_NAME"
                printf 'env[DB_USER] = %s\n' "$DB_USER"
                printf 'env[DB_PASS] = %s\n' "$DB_PASS"
                printf 'clear_env = no\n'
                printf '; GLAMEYE_DB_END\n'
              } >> "$POOL_CONF"
              echo "✓ Injected DB env into PHP-FPM www.conf"
            fi

            # 重载 PHP-FPM
            PHP_FPM=$(systemctl list-unit-files --type=service --no-legend | awk '/^php[0-9.]+-fpm\.service/{print $1; exit}')
            [ -n "$PHP_FPM" ] && systemctl reload "$PHP_FPM" 2>/dev/null || true

            echo "✅ GlamEye deployed at $(date) → $(git rev-parse --short HEAD)"
