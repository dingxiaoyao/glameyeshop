<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shop GlamEye false eyelashes - Mink, Vegan Faux Mink, and pro tools. Free U.S. shipping over $50." />
  <title>Shop All Lashes · GlamEye</title>
  <link rel="canonical" href="https://glameyeshop.com/shop.html" />
  <meta property="og:url" content="https://glameyeshop.com/shop.html" />
  <meta property="og:image" content="https://glameyeshop.com/images/products/hero-lash.jpg" />
  <meta property="og:site_name" content="GlamEye" />
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="top-bar">✨ Free U.S. Shipping <strong>$50+</strong> &nbsp;·&nbsp; 30-Day Returns &nbsp;·&nbsp; Cruelty-Free</div>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand"><img src="images/logo.png" alt="GlamEye" class="brand-logo" /></a>
      <button class="nav-toggle"><span></span><span></span><span></span></button>
      <nav class="site-nav">
        <a href="/">Home</a>
        <a href="shop.html" class="active">Shop</a>
        <a href="about.html">Story</a>
        <a href="wholesale.html">Wholesale</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="nav-actions">
        <a href="account.html" class="icon-button">👤</a>
        <a href="cart.html" class="icon-button">🛍 <span class="cart-count" id="cart-count">0</span></a>
      </div>
    </div>
  </header>

  <main class="shop-page">
    <div class="shop-header">
      <span class="eyebrow">All Products</span>
      <h1 id="shop-title">Shop the Collection</h1>
      <div class="divider-gold"></div>
      <p class="muted">Cruelty-free luxury lashes — find your signature look</p>
    </div>

    <div class="shop-filters" id="shop-filters">
      <button class="filter-chip active" data-cat="">All</button>
      <button class="filter-chip" data-cat="mink">Mink</button>
      <button class="filter-chip" data-cat="faux">Faux Mink (Vegan)</button>
      <button class="filter-chip" data-cat="magnetic">Magnetic</button>
      <button class="filter-chip" data-cat="tools">Tools & Accessories</button>
    </div>

    <div class="product-grid" id="all-products">
      <p class="muted text-center" style="grid-column: 1/-1;">Loading…</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom container">
      <p>© 2026 GlamEye, Inc. · Made with ❤ in Los Angeles</p>
      <div class="payment-icons"><span>VISA</span><span>MC</span><span>AMEX</span><span>APPLE PAY</span><span>PAYPAL</span></div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
