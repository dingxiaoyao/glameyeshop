<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg-tool1" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#080604"/>
    </radialGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="cap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d77b"/>
      <stop offset="50%" stop-color="#d4a955"/>
      <stop offset="100%" stop-color="#a8843a"/>
    </linearGradient>
    <radialGradient id="bottleHl" cx="40%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-tool1)"/>
  <!-- 阴影 -->
  <ellipse cx="400" cy="500" rx="120" ry="20" fill="#000" opacity="0.6"/>
  <!-- 瓶子主体 -->
  <g transform="translate(400 320)">
    <!-- 瓶身 -->
    <rect x="-80" y="-50" width="160" height="200" rx="10" ry="10" fill="url(#bottle)"/>
    <rect x="-80" y="-50" width="160" height="200" rx="10" ry="10" fill="url(#bottleHl)"/>
    <!-- 标签 -->
    <rect x="-65" y="20" width="130" height="100" fill="#0a0a0a" stroke="#d4a955" stroke-width="1"/>
    <text x="0" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="22"
          font-weight="700" fill="#d4a955" letter-spacing="2">GlamEye</text>
    <text x="0" y="80" text-anchor="middle" font-family="Helvetica" font-size="12" fill="#d4a955">CRYSTAL CLEAR</text>
    <text x="0" y="100" text-anchor="middle" font-family="Helvetica" font-size="11" fill="#999">Lash Adhesive · 5ml</text>
    <!-- 瓶颈 -->
    <rect x="-25" y="-90" width="50" height="40" fill="url(#bottle)"/>
    <!-- 金色瓶盖 -->
    <rect x="-30" y="-150" width="60" height="65" rx="3" ry="3" fill="url(#cap)"/>
    <!-- 顶部刷子 -->
    <line x1="0" y1="-150" x2="0" y2="-180" stroke="url(#cap)" stroke-width="4"/>
  </g>
  <text x="400" y="555" text-anchor="middle" font-family="Georgia, serif"
        font-size="18" font-weight="300" fill="#d4a955" letter-spacing="6">CRYSTAL ADHESIVE · 5ML</text>
</svg>
