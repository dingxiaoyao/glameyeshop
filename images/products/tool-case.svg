<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg-tool3" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#080604"/>
    </radialGradient>
    <linearGradient id="caseGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a955"/>
      <stop offset="50%" stop-color="#f5d77b"/>
      <stop offset="100%" stop-color="#a8843a"/>
    </linearGradient>
    <linearGradient id="caseInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-tool3)"/>
  <ellipse cx="400" cy="490" rx="180" ry="20" fill="#000" opacity="0.6"/>
  <!-- 收纳盒 -->
  <g transform="translate(400 300)">
    <!-- 盒身 -->
    <rect x="-150" y="-80" width="300" height="160" rx="12" ry="12" fill="url(#caseInner)" stroke="url(#caseGold)" stroke-width="3"/>
    <!-- 盖子打开 -->
    <path d="M -150 -80 L -150 -100 Q -150 -140 -120 -150 L 120 -150 Q 150 -140 150 -100 L 150 -80 Z"
          fill="url(#caseGold)" opacity="0.95"/>
    <!-- 镜子（盖子内侧） -->
    <rect x="-130" y="-130" width="260" height="40" fill="#dee9f0" opacity="0.4" rx="3"/>
    <!-- 内部分隔 -->
    <line x1="0" y1="-70" x2="0" y2="70" stroke="url(#caseGold)" stroke-width="1.5" opacity="0.5"/>
    <line x1="-150" y1="0" x2="150" y2="0" stroke="url(#caseGold)" stroke-width="1.5" opacity="0.5"/>
    <!-- 模拟里面放着的睫毛 -->
    <g stroke="#1a0a05" stroke-linecap="round" fill="none" stroke-width="1.5">
      <path d="M -110 -30 Q -100 -45 -85 -55"/>
      <path d="M  -90 -30 Q  -80 -45 -65 -55"/>
      <path d="M  -70 -30 Q  -60 -45 -45 -55"/>
      <path d="M  -50 -30 Q  -40 -45 -25 -55"/>
    </g>
    <g stroke="#1a0a05" stroke-linecap="round" fill="none" stroke-width="1.5">
      <path d="M  30 -30 Q  40 -45  55 -55"/>
      <path d="M  50 -30 Q  60 -45  75 -55"/>
      <path d="M  70 -30 Q  80 -45  95 -55"/>
      <path d="M  90 -30 Q 100 -45 115 -55"/>
    </g>
    <!-- Logo 浮雕 -->
    <text x="0" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="24"
          font-weight="700" fill="url(#caseGold)" opacity="0.9">GlamEye</text>
    <!-- 高光 -->
    <ellipse cx="-80" cy="-110" rx="40" ry="8" fill="#fff" opacity="0.3"/>
  </g>
  <text x="400" y="555" text-anchor="middle" font-family="Georgia, serif"
        font-size="18" font-weight="300" fill="#d4a955" letter-spacing="6">LUXURY STORAGE CASE</text>
</svg>
