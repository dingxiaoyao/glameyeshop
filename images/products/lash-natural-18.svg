<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg-natural" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0f08"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </radialGradient>
    <linearGradient id="gold-frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a955"/>
      <stop offset="50%" stop-color="#f5d77b"/>
      <stop offset="100%" stop-color="#a8843a"/>
    </linearGradient>
    <radialGradient id="iris-natural" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a2818"/>
      <stop offset="50%" stop-color="#5a3a20"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-natural)"/>
  <!-- 眼睛 -->
  <g transform="translate(400 320)">
    <!-- 眼皮上方 -->
    <ellipse cx="0" cy="0" rx="220" ry="80" fill="#f4d4b0" opacity="0.15"/>
    <!-- 眼白 -->
    <path d="M -200 0 Q -100 -55 0 -55 Q 100 -55 200 0 Q 100 55 0 55 Q -100 55 -200 0 Z"
          fill="#fafafa"/>
    <!-- 虹膜 -->
    <circle cx="0" cy="0" r="50" fill="url(#iris-natural)"/>
    <!-- 瞳孔 -->
    <circle cx="0" cy="0" r="20" fill="#000"/>
    <!-- 眼神光 -->
    <circle cx="-12" cy="-12" r="8" fill="white" opacity="0.95"/>
    <circle cx="15"  cy="10"  r="3" fill="white" opacity="0.7"/>
    <!-- 上睫毛（自然 18mm，根根分明，长度均匀） -->
    <g stroke="#1a1208" stroke-linecap="round" fill="none">
      <path d="M -195 -12 Q -200 -45 -198 -55"  stroke-width="2.5"/>
      <path d="M -180 -28 Q -185 -65 -180 -78"  stroke-width="2.8"/>
      <path d="M -160 -38 Q -163 -78 -155 -90"  stroke-width="3"/>
      <path d="M -140 -45 Q -140 -88 -130 -100" stroke-width="3.2"/>
      <path d="M -120 -50 Q -118 -95 -105 -108" stroke-width="3.3"/>
      <path d="M -100 -52 Q -95 -100 -80 -112"  stroke-width="3.4"/>
      <path d="M  -80 -54 Q  -72 -103 -55 -115" stroke-width="3.5"/>
      <path d="M  -60 -55 Q  -50 -105 -32 -118" stroke-width="3.5"/>
      <path d="M  -40 -55 Q  -28 -107 -10 -120" stroke-width="3.6"/>
      <path d="M  -20 -55 Q   -8 -107  10 -120" stroke-width="3.6"/>
      <path d="M    0 -55 Q   12 -107  30 -120" stroke-width="3.6"/>
      <path d="M   20 -55 Q   32 -105  50 -118" stroke-width="3.5"/>
      <path d="M   40 -55 Q   50 -103  68 -115" stroke-width="3.5"/>
      <path d="M   60 -54 Q   72 -100  88 -112" stroke-width="3.4"/>
      <path d="M   80 -52 Q   88 -95  103 -108" stroke-width="3.3"/>
      <path d="M  100 -50 Q  105 -90  120 -100" stroke-width="3.2"/>
      <path d="M  120 -45 Q  125 -85  138 -95"  stroke-width="3"/>
      <path d="M  140 -38 Q  145 -75  155 -85"  stroke-width="2.8"/>
      <path d="M  160 -28 Q  167 -62  175 -72"  stroke-width="2.5"/>
      <path d="M  180 -12 Q  188 -42  195 -50"  stroke-width="2.2"/>
    </g>
    <!-- 下睫毛（短） -->
    <g stroke="#1a1208" stroke-linecap="round" fill="none" stroke-width="1.5">
      <path d="M -150 35 Q -148 50 -142 60"/>
      <path d="M -100 50 Q -95 65 -88 75"/>
      <path d="M  -50 55 Q -45 70 -38 80"/>
      <path d="M    0 55 Q   5 70  12 80"/>
      <path d="M   50 55 Q  55 70  62 80"/>
      <path d="M  100 50 Q 105 65 112 75"/>
      <path d="M  150 35 Q 152 50 158 60"/>
    </g>
  </g>
  <!-- 标签 -->
  <text x="400" y="540" text-anchor="middle" font-family="Georgia, serif"
        font-size="18" font-weight="300" fill="#d4a955" letter-spacing="6">NATURAL · 18MM</text>
</svg>
