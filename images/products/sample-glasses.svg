<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fc"/>
      <stop offset="50%" stop-color="#e8eef7"/>
      <stop offset="100%" stop-color="#d4dde8"/>
    </linearGradient>
    <linearGradient id="heroFrame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#3d3d3d"/>
    </linearGradient>
    <radialGradient id="heroLens" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#bce0f7" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#7ab3d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3d6f8e" stop-opacity="0.15"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="20" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#heroBg)"/>
  <!-- 装饰性圆形 -->
  <circle cx="200" cy="150" r="100" fill="white" opacity="0.5"/>
  <circle cx="1000" cy="650" r="150" fill="white" opacity="0.4"/>
  <!-- 主图：高级眼镜 -->
  <g transform="translate(600 420)" filter="url(#shadow)">
    <!-- 大尺寸方圆形镜框 -->
    <rect x="-380" y="-110" width="300" height="220" rx="50" ry="50"
          fill="url(#heroLens)" stroke="url(#heroFrame)" stroke-width="20"/>
    <rect x="80"  y="-110" width="300" height="220" rx="50" ry="50"
          fill="url(#heroLens)" stroke="url(#heroFrame)" stroke-width="20"/>
    <path d="M -80 -10 Q 0 -45 80 -10" fill="none" stroke="url(#heroFrame)" stroke-width="20" stroke-linecap="round"/>
    <!-- 镜腿 -->
    <path d="M -380 -50 Q -460 -70 -490 -120" fill="none" stroke="url(#heroFrame)" stroke-width="14" stroke-linecap="round"/>
    <path d="M  380 -50 Q  460 -70  490 -120" fill="none" stroke="url(#heroFrame)" stroke-width="14" stroke-linecap="round"/>
    <!-- 高光 -->
    <ellipse cx="-280" cy="-50" rx="60" ry="25" fill="white" opacity="0.6"/>
    <ellipse cx="180"  cy="-50" rx="60" ry="25" fill="white" opacity="0.6"/>
    <ellipse cx="-260" cy="40"  rx="20" ry="8"  fill="white" opacity="0.4"/>
    <ellipse cx="200"  cy="40"  rx="20" ry="8"  fill="white" opacity="0.4"/>
  </g>
  <!-- 品牌水印 -->
  <text x="600" y="100" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="24" font-weight="200" fill="#666" letter-spacing="12">PREMIUM EYEWEAR</text>
</svg>
