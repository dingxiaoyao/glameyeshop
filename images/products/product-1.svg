<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e8e8eb"/>
    </linearGradient>
    <linearGradient id="frame1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
    <radialGradient id="lens1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8d8ea" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#5a8fad" stop-opacity="0.2"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg1)"/>
  <!-- 经典方形眼镜 -->
  <g transform="translate(400 300)">
    <!-- 镜框 -->
    <rect x="-280" y="-80" width="220" height="160" rx="20" ry="20"
          fill="url(#lens1)" stroke="url(#frame1)" stroke-width="14"/>
    <rect x="60"  y="-80" width="220" height="160" rx="20" ry="20"
          fill="url(#lens1)" stroke="url(#frame1)" stroke-width="14"/>
    <!-- 鼻梁 -->
    <path d="M -60 -10 Q 0 -30 60 -10" fill="none" stroke="url(#frame1)" stroke-width="14" stroke-linecap="round"/>
    <!-- 镜腿 -->
    <path d="M -280 -50 Q -340 -60 -360 -100" fill="none" stroke="url(#frame1)" stroke-width="10" stroke-linecap="round"/>
    <path d="M  280 -50 Q  340 -60  360 -100" fill="none" stroke="url(#frame1)" stroke-width="10" stroke-linecap="round"/>
    <!-- 镜片高光 -->
    <ellipse cx="-200" cy="-30" rx="40" ry="20" fill="white" opacity="0.4"/>
    <ellipse cx="140"  cy="-30" rx="40" ry="20" fill="white" opacity="0.4"/>
  </g>
  <text x="400" y="540" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="28" font-weight="300" fill="#666" letter-spacing="4">CLASSIC SQUARE</text>
</svg>
